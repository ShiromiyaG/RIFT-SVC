# model
# dim-depth

seed: 2025

defaults:
  - _self_
  - model: dit-512-8

dataset:
  data_dir: "data/finetune"
  meta_info_path: "data/finetune/meta_info.json"
  # Context per sample: 512 frames ~= 6s at 44.1kHz/hop512, closer to the segment
  # lengths seen at inference. On OOM try 384 (~4.5s) or 256 (~3s, the pretrain
  # default — also restore batch_size_per_gpu: 64), or reduce the batch size.
  # 768 (~9s) is an option on high-VRAM GPUs.
  max_frame_len: 512

training:
  optimizer_type: adamwsf
  # Matches the README finetune recipe for dit-768-12 (and the GUI default)
  learning_rate: 0.00005
  betas: (0.9, 0.95)
  weight_decay: 0.01
  batch_size_per_gpu: 32
  grad_accumulation_steps: 1
  # Compile the DiT transformer with torch.compile (inductor if triton is
  # installed, otherwise aot_eager). First steps are slower while compiling.
  compile_model: false
  # Clip gradients for stability on small finetune datasets
  max_grad_norm: 1.0
  # Recompute transformer activations in backward: large VRAM cut at ~20-30%
  # slower steps. Enable only if hitting OOM (prefer it over reducing batch size)
  gradient_checkpointing: false
  # Keep the pre-EMA-swap weight backup on CPU during validation: one less full
  # copy of the weights in VRAM at validation time, slightly slower swap
  ema_offload_backup: false
  max_steps: 10000
  warmup_ratio: 0.05
  save_per_steps: 1000
  test_per_steps: 1000
  log_media_per_steps: 1000
  wandb_project: "RIFT-SVC-FT"
  run_name: "finetune_dit-512-8_steps${training.max_steps}-lr${training.learning_rate}" 
  save_weights_only: true
  # Disk-friendly checkpoints: keep ONE full resumable 'last.ckpt' (overwritten
  # in place, ignores save_weights_only) and save the periodic model-step=N /
  # model-best checkpoints as small fp16 inference-only files (~4x smaller,
  # EMA merged in, not resumable)
  slim_checkpoints: false
  num_workers: 8
  eval_sample_steps: 32
  # Single-speaker recipe (default): freeze the adaLN/time-embedding pathway and
  # never drop the speaker — the frozen null-speaker branch from the pretrain then
  # keeps inference-time speaker CFG working.
  # For MULTI-speaker finetune use: training.freeze_adaln_and_tembed=false training.drop_spk_prob=0.2
  # (the GUI training tab sets these automatically from the dataset)
  freeze_adaln_and_tembed: true
  drop_spk_prob: 0.0
  # Exponential moving average of the weights; checkpoints store it under
  # 'ema_state_dict' and inference prefers it automatically. Set 0 to disable.
  ema_decay: 0.999
  # Gaussian noise added to the content vectors during training. Fights source
  # timbre leaking through the cvec, improving target timbre similarity. The
  # cvec std is ~0.3, so try 0.01-0.05 (start at 0.02). 0 disables.
  cvec_noise_std: 0.0
  # Start new speaker embedding(s) from the pretrain's "average voice" (mean
  # speaker / null-speaker embedding) instead of random init: faster and better
  # timbre convergence, especially on short finetunes
  init_spk_embed_from_pretrain: true
  time_schedule: "lognorm"
  # Vocoder used to render validation audio/metrics: nsf-hifigan or pc-nsf-hifigan
  vocoder: "nsf-hifigan"
  # Logger options
  logger: "wandb"  # Options: "wandb" or "tensorboard"